app-id: com.gitlab.martintornqvist.InfraArcana
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: infra-arcana

finish-args:
- --device=all
- --share=ipc
- --socket=fallback-x11
- --socket=pulseaudio
- --socket=wayland

modules:
  # Infra Arcana needs the SDL2 `SDL2_image` library, which the Freedesktop
  # runtime no longer ships as of 25.08 (it provides the SDL3 version instead),
  # so we build it from source against the SDK's `sdl2-compat`.
  - name: sdl2-image
    buildsystem: cmake-ninja
    # SDL_image refuses to configure in-tree, so build it in a subdirectory.
    builddir: true
    config-opts:
      - -DSDL2IMAGE_SAMPLES=OFF
      - -DSDL2IMAGE_TESTS=OFF
      - -DSDL2IMAGE_VENDORED=OFF
    sources:
      - type: archive
        url: https://github.com/libsdl-org/SDL_image/releases/download/release-2.8.12/SDL2_image-2.8.12.tar.gz
        sha256: 393f5efb50536ec13ca4f4affb69cc9966d3c3f969e6c5e701faddf9f9785381

  - name: infra-arcana
    buildsystem: cmake
    # Infra Arcana's CMakeLists predates the minimum CMake version the 25.08
    # SDK accepts; allow it to configure anyway.
    config-opts:
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    build-commands:
      # Install the game executable and assets.
      - install -Dm755 ./ia -t /app/lib/infra-arcana
      - cp -r ./audio /app/lib/infra-arcana/
      - cp -r ./data /app/lib/infra-arcana/
      - cp -r ./gfx /app/lib/infra-arcana/
      - cp ./manual.txt /app/lib/infra-arcana/
      # Install the required wrapper script (we need to change into the
      # executable's directory since it uses relative paths to look for the
      # assets).
      - install -Dm755 infra-arcana -t /app/bin
      # Install the desktop file, the icon and the AppData file.
      - install -Dm644 ${FLATPAK_ID}.desktop -t /app/share/applications
      - install -Dm644 ${FLATPAK_ID}.png -t /app/share/icons/hicolor/128x128/apps
      - install -Dm644 ${FLATPAK_ID}.metainfo.xml -t /app/share/metainfo
    sources:
      - type: git
        url: https://gitlab.com/martin-tornqvist/ia.git
        tag: v23.0.0
        commit: 51443407f4017754e59763f12f2c7ab4704e8ee2
      - type: script
        dest-filename: infra-arcana
        commands:
          - cd /app/lib/infra-arcana
          - exec ./ia "$@"
      - type: file
        path: com.gitlab.martintornqvist.InfraArcana.desktop
      - type: file
        path: com.gitlab.martintornqvist.InfraArcana.png
      - type: file
        path: com.gitlab.martintornqvist.InfraArcana.metainfo.xml
